name: ShellCheck

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -name "*.sh" -not -path "./.git/*" -print0 \
            | xargs -0 shellcheck -S warning -x
