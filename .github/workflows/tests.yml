name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  syntax:
    name: Bash syntax validation
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check all scripts
        run: bash tests/test_syntax.sh

  shellcheck:
    name: ShellCheck compliance
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: bash tests/test_shellcheck.sh
