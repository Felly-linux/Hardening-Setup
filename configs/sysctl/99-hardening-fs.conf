# =============================================================================
# /etc/sysctl.d/99-hardening-fs.conf
# Filesystem and memory protection parameters — VPS Hardening Suite
# Deployed by modules/sysctl.sh when SYSCTL_FS_HARDENING=yes
# =============================================================================

# ---------------------------------------------------------------------------
# Protect hard links
# Restricts hard link creation to files owned by the linking user, OR
# to files the linking user has read+write access to (prevents TOCTOU attacks)
# ---------------------------------------------------------------------------
fs.protected_hardlinks = 1

# ---------------------------------------------------------------------------
# Protect symbolic links
# Restricts symlink following in sticky world-writable directories:
# the link must be owned by the follower, or the directory owner must match
# the link owner. Defeats many /tmp race-condition (symlink) attacks.
# ---------------------------------------------------------------------------
fs.protected_symlinks = 1

# ---------------------------------------------------------------------------
# Protect FIFOs (named pipes) in sticky world-writable directories
# Same principle as symlink protection above
# ---------------------------------------------------------------------------
fs.protected_fifos = 1

# ---------------------------------------------------------------------------
# Protect regular files in sticky world-writable directories
# Prevents unprivileged processes from writing to files they do not own
# in shared-writable directories like /tmp
# ---------------------------------------------------------------------------
fs.protected_regular = 2

# ---------------------------------------------------------------------------
# Disable SUID core dumps
# When set to 0, processes that drop privileges (setuid/setgid) do not
# produce core dump files — prevents secrets from leaking via crash dumps
# Note: SYSCTL_DISABLE_CORE_DUMPS in the profile adds further limits.conf rules
# ---------------------------------------------------------------------------
fs.suid_dumpable = 0
