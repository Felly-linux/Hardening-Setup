# =============================================================================
# /etc/sysctl.d/99-hardening-network.conf
# Network stack hardening parameters — VPS Hardening Suite
# Deployed by modules/sysctl.sh when SYSCTL_NETWORK_HARDENING=yes
# =============================================================================

# ---------------------------------------------------------------------------
# IP Forwarding (disabled by default; enable via SYSCTL_IP_FORWARD=yes)
# Required by Docker, LXC, and NAT/router setups
# ---------------------------------------------------------------------------
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# ---------------------------------------------------------------------------
# Anti-spoofing: Reverse Path Filtering
# Drops packets with source addresses that cannot be reached via the
# interface they arrived on — defeats IP spoofing attacks
# ---------------------------------------------------------------------------
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# ---------------------------------------------------------------------------
# Disable source routing (prevents an attacker from dictating packet routes)
# ---------------------------------------------------------------------------
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# ---------------------------------------------------------------------------
# SYN flood protection via SYN cookies
# Mitigates resource exhaustion from large-scale SYN flood attacks
# ---------------------------------------------------------------------------
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 2048
net.ipv4.tcp_synack_retries = 2
net.ipv4.tcp_syn_retries = 5

# ---------------------------------------------------------------------------
# TCP TIME_WAIT Assassination Protection (RFC 1337)
# An attacker sending RST segments to a socket in TIME_WAIT can cause it to
# close prematurely, enabling port reuse and session hijacking.
# ---------------------------------------------------------------------------
net.ipv4.tcp_rfc1337 = 1

# ---------------------------------------------------------------------------
# ICMP security
# Prevent Smurf amplification and ignore bogus ICMP error messages
# ---------------------------------------------------------------------------
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# ---------------------------------------------------------------------------
# Disable ICMP redirect acceptance and sending
# Prevents routing table manipulation via ICMP redirects
# ---------------------------------------------------------------------------
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# "Secure" redirects still allow ICMP redirects from gateways listed in the
# routing table — exploitable via ARP spoofing. Disable entirely.
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# ---------------------------------------------------------------------------
# Disable IPv6 router advertisements
# Prevents rogue RA attacks (unless the host is a gateway, leave disabled)
# ---------------------------------------------------------------------------
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# ---------------------------------------------------------------------------
# Disable IPv6 if not used (controlled by SYSCTL_DISABLE_IPV6 profile var)
# Default 0 = IPv6 enabled; sysctl module patches to 1 when flag is set.
# Disabling reduces attack surface on services that only listen on IPv4.
# ---------------------------------------------------------------------------
net.ipv6.conf.all.disable_ipv6 = 0
net.ipv6.conf.default.disable_ipv6 = 0
net.ipv6.conf.lo.disable_ipv6 = 0

# ---------------------------------------------------------------------------
# TCP performance and memory tuning
# Improves throughput under load; not security-specific but included here
# ---------------------------------------------------------------------------
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 5000
net.ipv4.tcp_rmem = 4096 65536 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15
