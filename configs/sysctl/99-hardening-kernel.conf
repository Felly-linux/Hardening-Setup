# =============================================================================
# /etc/sysctl.d/99-hardening-kernel.conf
# Kernel information-disclosure and privilege hardening — VPS Hardening Suite
# Deployed by modules/sysctl.sh when SYSCTL_KERNEL_HARDENING=yes
# =============================================================================

# ---------------------------------------------------------------------------
# Restrict dmesg access to root
# Prevents unprivileged users from reading kernel ring buffer, which can
# contain addresses, driver info, and other exploit-useful material
# ---------------------------------------------------------------------------
kernel.dmesg_restrict = 1

# ---------------------------------------------------------------------------
# Restrict kernel pointer exposure (/proc/kallsyms, /proc/modules etc.)
# Level 2: always replace with zeros, even for processes with CAP_SYSLOG
# Defeats KASLR-bypass techniques used in privilege escalation chains
# ---------------------------------------------------------------------------
kernel.kptr_restrict = 2

# ---------------------------------------------------------------------------
# Restrict ptrace scope (Yama LSM)
# Level 1: only a parent process (or CAP_SYS_PTRACE) may trace a child
# Prevents cross-process memory inspection used in credential dumping
# Can break: gdb, strace on arbitrary PIDs; use 'sudo strace' as workaround
# ---------------------------------------------------------------------------
kernel.yama.ptrace_scope = 1

# ---------------------------------------------------------------------------
# Address Space Layout Randomisation (ASLR)
# Level 2: full randomisation of stack, VDSO, mmap, heap base
# Raises the bar for return-oriented-programming (ROP) exploits
# ---------------------------------------------------------------------------
kernel.randomize_va_space = 2

# ---------------------------------------------------------------------------
# Restrict kernel log level visible to unprivileged processes
# Format: console_loglevel default_message_loglevel min_console_loglevel default_console_loglevel
# ---------------------------------------------------------------------------
kernel.printk = 3 4 1 3

# ---------------------------------------------------------------------------
# Disable magic SysRq key
# Prevents local attackers (or scripts with /proc/sysrq-trigger access)
# from triggering kernel dumps, reboots, or remounting filesystems
# ---------------------------------------------------------------------------
kernel.sysrq = 0

# ---------------------------------------------------------------------------
# Restrict /proc/pid directories to their owner and root
# Prevents cross-user process enumeration (/proc/$pid/cmdline, /maps etc.)
# ---------------------------------------------------------------------------
kernel.hidepid = 2

# ---------------------------------------------------------------------------
# Disable unprivileged eBPF
# eBPF programs can be used for kernel-level info disclosure and attacks
# ---------------------------------------------------------------------------
kernel.unprivileged_bpf_disabled = 1

# ---------------------------------------------------------------------------
# Disable net.core perf events for unprivileged users
# ---------------------------------------------------------------------------
kernel.perf_event_paranoid = 3

# ---------------------------------------------------------------------------
# Include PID in core dump filenames
# When a process crashes, core files are named core.<pid> rather than just
# 'core', preventing one process from overwriting another's crash dump.
# Useful for post-mortem analysis when core dumps are intentionally allowed.
# ---------------------------------------------------------------------------
kernel.core_uses_pid = 1

# ---------------------------------------------------------------------------
# Restrict userfaultfd to privileged users
# userfaultfd has been abused in several kernel UAF exploit chains
# ---------------------------------------------------------------------------
vm.unprivileged_userfaultfd = 0
