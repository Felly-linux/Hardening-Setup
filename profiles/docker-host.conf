# =============================================================================
# Profile: Docker Host
# =============================================================================
# Use case:  VPS running Docker workloads alongside a full observability stack
#            (Prometheus + Grafana + Loki + Promtail).
# Tradeoffs: Docker socket access (/var/run/docker.sock) is equivalent to root
#            on the host — only trusted users in the 'docker' group. Monitoring
#            ports bound to 127.0.0.1 only; expose via reverse proxy with auth.
#            IP forwarding must be enabled for container networking (iptables
#            masquerade). Docker bypasses UFW by default — the docker module
#            applies DOCKER-USER chain rules to compensate.
# WARNING:   Review GRAFANA_PASSWORD before first run.
# Modules:   preflight system users ssh firewall fail2ban crowdsec sysctl
#            docker monitoring
# =============================================================================

# -- Module selection ---------------------------------------------------------
ENABLED_MODULES="preflight system users ssh firewall fail2ban crowdsec sysctl docker monitoring"

# -- SSH ----------------------------------------------------------------------
SSH_PORT=22
SSH_PASSWORD_AUTH=no
SSH_MAX_AUTH_TRIES=3
SSH_PERMIT_ROOT_LOGIN=no
SSH_ALLOW_TCP_FORWARDING=no
SSH_ALLOW_AGENT_FORWARDING=no
SSH_X11_FORWARDING=no

# -- Fail2Ban -----------------------------------------------------------------
FAIL2BAN_SSH_MAXRETRY=3
FAIL2BAN_SSH_BANTIME=7200
FAIL2BAN_SSH_FINDTIME=600

# -- CrowdSec -----------------------------------------------------------------
CROWDSEC_LAPI_PORT=6767

# -- Sysctl -------------------------------------------------------------------
SYSCTL_NETWORK_HARDENING=yes
SYSCTL_KERNEL_HARDENING=yes
SYSCTL_FS_HARDENING=yes
SYSCTL_IP_FORWARD=yes         # REQUIRED: Docker bridge networking needs IP forwarding
SYSCTL_DISABLE_IPV6=no
SYSCTL_DISABLE_CORE_DUMPS=yes
SYSCTL_RESTRICT_DMESG=yes

# -- Auditd -------------------------------------------------------------------
AUDITD_ENABLED=no
AUDITD_RULES_LEVEL=standard

# -- Docker -------------------------------------------------------------------
DOCKER_ENABLED=yes            # Install and harden Docker daemon
# Docker daemon listens on Unix socket only (no TCP by default)
# docker module writes /etc/docker/daemon.json with:
#   no-new-privileges, userland-proxy disabled, log rotation

# -- Monitoring ---------------------------------------------------------------
MONITORING_ENABLED=yes        # Deploy Prometheus + Grafana + Loki stack
MONITORING_DIR=/opt/monitoring # Docker Compose project root
GRAFANA_PASSWORD=changeme      # CHANGE THIS before running install.sh
# All monitoring ports bind to 127.0.0.1; expose via nginx/Caddy with TLS+auth

# -- Permissions / filesystem -------------------------------------------------
PERMISSIONS_TMP_NOEXEC=yes
PERMISSIONS_UMASK=027

# -- UFW firewall -------------------------------------------------------------
# Ports 80/443 needed for containerised web services (reverse proxy)
UFW_ALLOW_PORTS="22 80 443"
