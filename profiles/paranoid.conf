# =============================================================================
# Profile: Paranoid
# =============================================================================
# Use case:  High-value targets, compliance environments (PCI-DSS, CIS Level 2,
#            STIG), systems storing sensitive data, or public-facing servers
#            under active threat.
# Tradeoffs: This profile will break some applications:
#            - ptrace_scope=1 breaks JVM debuggers, some profilers, GDB attach
#            - /tmp noexec may break package managers that extract there
#            - SSH port 2222 requires firewall/NAT rule updates
#            - 7-day bans will lock out legitimate users who mistype credentials
#            - Auditd generates significant I/O — provision storage accordingly
#            - kernel.sysrq=0 means no emergency keyboard recovery
#            - -e 2 in audit rules requires reboot to modify audit config
# WARNING:   Test on a non-production clone before applying to live systems.
#            Have out-of-band console access (IPMI/VNC/serial) before applying.
# Modules:   preflight system users ssh firewall fail2ban crowdsec sysctl
#            audit permissions
# =============================================================================

# -- Module selection ---------------------------------------------------------
ENABLED_MODULES="preflight system users ssh firewall fail2ban crowdsec sysctl audit permissions"

# -- SSH ----------------------------------------------------------------------
SSH_PORT=2222                     # Non-standard port reduces automated scanner noise
SSH_PASSWORD_AUTH=no              # Keys only — password auth is never acceptable here
SSH_MAX_AUTH_TRIES=2              # Disconnect after 2 wrong keys (minimal foothold time)
SSH_PERMIT_ROOT_LOGIN=no          # Root must escalate via sudo from an audit-logged user
SSH_ALLOW_TCP_FORWARDING=no       # No tunnels; each service uses its own access control
SSH_ALLOW_AGENT_FORWARDING=no     # Never proxy key material through a potentially hostile host
SSH_X11_FORWARDING=no
SSH_USE_PAM=yes                   # Enable PAM for additional auth controls (MFA if configured)

# -- Fail2Ban -----------------------------------------------------------------
FAIL2BAN_SSH_MAXRETRY=2           # Immediate escalation after 2 failures
FAIL2BAN_SSH_BANTIME=604800       # 7-day ban — attackers cannot retry for a week
FAIL2BAN_SSH_FINDTIME=60          # Count 2 failures within 60 seconds for quick detection

# -- CrowdSec -----------------------------------------------------------------
CROWDSEC_LAPI_PORT=6767

# -- Sysctl -------------------------------------------------------------------
SYSCTL_NETWORK_HARDENING=yes
SYSCTL_KERNEL_HARDENING=yes
SYSCTL_FS_HARDENING=yes
SYSCTL_IP_FORWARD=no
SYSCTL_DISABLE_IPV6=no            # Disable IPv6 at kernel level if SYSCTL_DISABLE_IPV6=yes
SYSCTL_DISABLE_CORE_DUMPS=yes     # Prevent coredumps leaking keys, tokens, plaintext memory
SYSCTL_RESTRICT_DMESG=yes         # dmesg leaks kernel addresses; restrict to root

# -- Auditd -------------------------------------------------------------------
AUDITD_ENABLED=yes                # Full audit trail mandatory for compliance
AUDITD_RULES_LEVEL=paranoid       # Activates the extended rule set in configs/audit/

# -- Docker -------------------------------------------------------------------
DOCKER_ENABLED=no                 # Container workloads use a separate hardened host

# -- Monitoring ---------------------------------------------------------------
MONITORING_ENABLED=no             # Monitoring deployed separately with dedicated credentials

# -- Permissions / filesystem -------------------------------------------------
PERMISSIONS_TMP_NOEXEC=yes        # Block script-based exploits dropped to /tmp
PERMISSIONS_UMASK=027             # New files: owner rw, group r, world none
PERMISSIONS_AUDIT_SUID=yes        # Log all SUID/SGID binaries to audit report after run

# -- UFW firewall -------------------------------------------------------------
UFW_ALLOW_PORTS="2222"            # Only the non-standard SSH port; all else denied
