# =============================================================================
# Profile: Desktop / Workstation
# =============================================================================
# Use case:  Developer workstation, dual-boot laptop, or personal machine
#            connected to a trusted local network.
# Tradeoffs: Fail2Ban is omitted — brute-force SSH attacks are not a realistic
#            threat on a home LAN with NAT. UFW is minimal; the operator is
#            expected to add rules for their specific dev stack.
#            Kernel hardening is disabled because ptrace restrictions break
#            debuggers (GDB, strace), and VirtualBox/VMware hypervisors need
#            unrestricted kernel module loading.
#            /tmp noexec is disabled — many build systems (CMake, npm, cargo)
#            write and execute temporary binaries there.
#            The 'permissions' module runs to enforce SUID/SGID auditing and
#            safe home-directory permissions.
# Modules:   preflight sysctl firewall permissions
# =============================================================================

# -- Module selection ---------------------------------------------------------
PROFILE_NAME="desktop"
PROFILE_DESC="Minimal: UFW + sysctl + filesystem permissions only"

ENABLED_MODULES="preflight sysctl firewall permissions"

# -- SSH ----------------------------------------------------------------------
# SSH module not in ENABLED_MODULES for desktop, but values kept for reference
# in case the operator manually enables it.
SSH_PORT=22
SSH_ALLOW_TCP_FORWARDING=yes  # Useful for developer tunnels (e.g., kubectl port-forward over SSH)
SSH_ALLOW_AGENT_FORWARDING=yes
SSH_X11_FORWARDING=no         # X forwarding over network is rarely needed locally

# -- Sysctl -------------------------------------------------------------------
SYSCTL_NETWORK_HARDENING=yes  # Still harden network stack (router ads, ICMP redirect)
SYSCTL_KERNEL_HARDENING=no    # Disabled: ptrace scope=1 breaks GDB, VirtualBox, perf
SYSCTL_FS_HARDENING=yes
SYSCTL_IP_FORWARD=no
SYSCTL_DISABLE_IPV6=no        # Keep IPv6 functional for modern web development
SYSCTL_DISABLE_CORE_DUMPS=no  # Core dumps essential for debugging application crashes
SYSCTL_RESTRICT_DMESG=no      # Developer needs dmesg for driver/hardware debugging

# -- Auditd -------------------------------------------------------------------
AUDITD_ENABLED=no             # Audit daemon too noisy and performance-heavy for desktop

# -- Docker -------------------------------------------------------------------
DOCKER_ENABLED=no             # Install Docker manually if needed; profile stays minimal

# -- Monitoring ---------------------------------------------------------------
MONITORING_ENABLED=no

# -- Permissions / filesystem -------------------------------------------------
PERMISSIONS_TMP_NOEXEC=no     # Build tools (cargo, npm, cmake) execute from /tmp
PERMISSIONS_UMASK=022         # Standard desktop umask
PERMISSIONS_AUDIT_SUID=yes    # Enumerate SUID/SGID binaries after hardening for review

# -- UFW firewall -------------------------------------------------------------
UFW_ALLOW_PORTS="22"          # SSH only; operator adds ports for their dev services
