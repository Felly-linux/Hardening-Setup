# =============================================================================
# Profile: Homelab
# =============================================================================
# Use case:  Home network server in a physically controlled, trusted LAN
#            environment. May host local services (web UI, dashboards, code
#            server) and SSH tunnels back to cloud resources.
# Tradeoffs: TCP and agent forwarding are enabled to support SSH tunnels and
#            jump-host patterns — acceptable risk on a trusted LAN. Ban times
#            are relaxed to avoid locking out the operator during testing.
#            Kernel hardening is disabled because some desktop-adjacent tools
#            (e.g., VirtualBox kernel modules, certain debuggers) depend on
#            ptrace permissions that kernel hardening restricts.
#            CrowdSec and the 'users' hardening module are omitted — fine for
#            home use where account management is manual.
# Modules:   preflight system ssh firewall fail2ban sysctl
# =============================================================================

# -- Module selection ---------------------------------------------------------
PROFILE_NAME="homelab"
PROFILE_DESC="Relaxed: TCP forwarding on, no brute-force protection"

ENABLED_MODULES="preflight system ssh firewall fail2ban sysctl"

# -- SSH ----------------------------------------------------------------------
SSH_PORT=22
SSH_PASSWORD_AUTH=no          # Still prefer keys even on a trusted LAN
SSH_MAX_AUTH_TRIES=5          # More lenient — typos happen at home
SSH_PERMIT_ROOT_LOGIN=no
SSH_ALLOW_TCP_FORWARDING=yes  # Needed for SSH tunnels (e.g., reverse tunnels to VPS)
SSH_ALLOW_AGENT_FORWARDING=yes # Needed to hop from homelab to remote hosts via agent
SSH_X11_FORWARDING=no

# -- Fail2Ban -----------------------------------------------------------------
FAIL2BAN_SSH_MAXRETRY=5       # Relaxed — accommodate LAN clients with wrong configs
FAIL2BAN_SSH_BANTIME=3600     # 1-hour ban (shorter than VPS — easier self-recovery)
FAIL2BAN_SSH_FINDTIME=600

# -- Sysctl -------------------------------------------------------------------
SYSCTL_NETWORK_HARDENING=yes  # Still harden network stack
SYSCTL_KERNEL_HARDENING=no    # Disabled: ptrace restrictions break VirtualBox/GDB
SYSCTL_FS_HARDENING=yes
SYSCTL_IP_FORWARD=no
SYSCTL_DISABLE_IPV6=no
SYSCTL_DISABLE_CORE_DUMPS=no  # Allow core dumps for local debugging
SYSCTL_RESTRICT_DMESG=no      # Allow operator to read dmesg without sudo

# -- Auditd -------------------------------------------------------------------
AUDITD_ENABLED=no             # Too noisy for a home environment
AUDITD_RULES_LEVEL=standard

# -- Docker -------------------------------------------------------------------
DOCKER_ENABLED=no

# -- Monitoring ---------------------------------------------------------------
MONITORING_ENABLED=no         # Optional; deploy manually if needed

# -- Permissions / filesystem -------------------------------------------------
PERMISSIONS_TMP_NOEXEC=yes
PERMISSIONS_UMASK=022         # Slightly more permissive for shared home services

# -- UFW firewall -------------------------------------------------------------
# Includes common home server ports: HTTP, HTTPS, alternative HTTP, Node/React dev
UFW_ALLOW_PORTS="22 80 443 8080 3000"
