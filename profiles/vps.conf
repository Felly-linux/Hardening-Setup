# =============================================================================
# Profile: VPS
# =============================================================================
# Use case:  Remote server with minimal attack surface (cloud VPS, dedicated
#            server, managed instance).
# Tradeoffs: No desktop applications assumed. SSH key-only authentication
#            enforced. TCP forwarding disabled — use a bastion if tunnels are
#            needed. No Docker or monitoring stack deployed.
# Modules:   preflight system users ssh firewall fail2ban crowdsec sysctl
# =============================================================================

# -- Module selection ---------------------------------------------------------
# Space-separated list of modules that install.sh will execute in order.
ENABLED_MODULES="preflight system users ssh firewall fail2ban crowdsec sysctl"

# -- SSH ----------------------------------------------------------------------
SSH_PORT=22
SSH_PASSWORD_AUTH=no          # Enforce key-based authentication only
SSH_MAX_AUTH_TRIES=3          # Lockout after 3 failed attempts
SSH_PERMIT_ROOT_LOGIN=no      # Root must sudo from an unprivileged account
SSH_ALLOW_TCP_FORWARDING=no   # No tunnels; reduces lateral-movement risk
SSH_ALLOW_AGENT_FORWARDING=no # Agent forwarding exposes key material on server
SSH_X11_FORWARDING=no         # No display forwarding on a headless server

# -- Fail2Ban -----------------------------------------------------------------
FAIL2BAN_SSH_MAXRETRY=3       # Ban after 3 failed SSH attempts (matches MAX_AUTH_TRIES)
FAIL2BAN_SSH_BANTIME=7200     # Ban for 2 hours (seconds)
FAIL2BAN_SSH_FINDTIME=600     # Count failures within a 10-minute window

# -- CrowdSec -----------------------------------------------------------------
CROWDSEC_LAPI_PORT=6767       # Non-default LAPI port to avoid fingerprinting

# -- Sysctl -------------------------------------------------------------------
SYSCTL_NETWORK_HARDENING=yes  # Apply 99-hardening-network.conf
SYSCTL_KERNEL_HARDENING=yes   # Apply 99-hardening-kernel.conf
SYSCTL_FS_HARDENING=yes       # Apply 99-hardening-fs.conf
SYSCTL_IP_FORWARD=no          # Not a router; disable IP forwarding
SYSCTL_DISABLE_IPV6=no        # Keep IPv6 enabled; set to yes only if unused
SYSCTL_DISABLE_CORE_DUMPS=yes # Prevent core dumps leaking sensitive memory
SYSCTL_RESTRICT_DMESG=yes     # Restrict dmesg to root only

# -- Auditd -------------------------------------------------------------------
AUDITD_ENABLED=no             # Auditd adds overhead; enable with paranoid profile
AUDITD_RULES_LEVEL=standard   # standard | paranoid (used if AUDITD_ENABLED=yes)

# -- Docker -------------------------------------------------------------------
DOCKER_ENABLED=no             # Not a container host

# -- Monitoring ---------------------------------------------------------------
MONITORING_ENABLED=no         # No observability stack on a bare VPS

# -- Permissions / filesystem -------------------------------------------------
PERMISSIONS_TMP_NOEXEC=yes    # Mount /tmp noexec to block script-based exploits
PERMISSIONS_UMASK=027         # Default umask: new files not world-readable

# -- UFW firewall -------------------------------------------------------------
UFW_ALLOW_PORTS="22"          # Only SSH exposed by default; add ports as needed
